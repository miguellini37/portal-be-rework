name: CICD

on:
  push:
    branches: [main]

jobs:
  build:
    runs-on: [ubuntu-latest]
    steps:
      - name: Checkout source
        uses: actions/checkout@v3
      - name: Login to docker hub
        run: docker login -u ${{ secrets.DOCKER_USERNAME }} -p ${{ secrets.DOCKER_PASSWORD }} 
      - name: Build docker image
        run: docker build -t portaljobs/portal-backend .
      - name: Publish image to docker hub
        run: docker push portaljobs/portal-backend:latest
        
  deploy:
    needs: build
    runs-on: [self-hosted]
    steps:
      - name: Login to docker hub
        run: docker login -u ${{ secrets.DOCKER_USERNAME }} -p ${{ secrets.DOCKER_PASSWORD }} 

      - name: Free disk space before pull
        run: |
          # Remove only previous portal-backend images to free space
          ids=$(docker images -q portaljobs/portal-backend || true)
          if [ -n "$ids" ]; then
            docker rmi -f $ids || true
          fi
          df -h

      - name: Pull image from docker hub
        run: docker pull portaljobs/portal-backend:latest

      - name: Check host memory
        run: |
          echo "=== Memory ==="
          free -m
          echo "=== Docker containers ==="
          docker stats --no-stream --format "table {{.Name}}\t{{.MemUsage}}\t{{.MemPerc}}" || true

      - name: Delete old container
        run: docker rm -f portal-backend-container || true

      - name: Write .env file from secret
        run: echo "${{ secrets.ENV_FILE }}" > .env

      - name: Run Docker container
        run: |
          docker run -d \
            --env-file .env \
            --memory=192m \
            -e NODE_OPTIONS="--max-old-space-size=128" \
            -p 3000:3001 \
            --name portal-backend-container \
            portaljobs/portal-backend:latest

      - name: Cleanup .env file
        run: rm -f .env
