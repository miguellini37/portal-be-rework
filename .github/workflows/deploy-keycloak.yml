name: Deploy Keycloak

on:
  workflow_dispatch:

jobs:
  deploy-keycloak:
    runs-on: [self-hosted]
    steps:
      - name: Ensure swap exists (t2.micro safety net)
        shell: bash
        run: |
          if [ ! -f /swapfile ]; then
            sudo fallocate -l 1G /swapfile
            sudo chmod 600 /swapfile
            sudo mkswap /swapfile
            sudo swapon /swapfile
            echo '/swapfile none swap sw 0 0' | sudo tee -a /etc/fstab
          fi
          sudo swapon --show

      - name: Check host memory
        run: |
          echo "=== Memory ==="
          free -m
          echo "=== Docker containers ==="
          docker stats --no-stream --format "table {{.Name}}\t{{.MemUsage}}\t{{.MemPerc}}" || true

      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Login to docker hub
        run: docker login -u ${{ secrets.DOCKER_USERNAME }} -p ${{ secrets.DOCKER_PASSWORD }}

      - name: Free disk space before pull
        shell: bash
        run: |
          set -euo pipefail
          # Remove only previous Keycloak images to free space
          ids=$(docker images -q quay.io/keycloak/keycloak || true)
          if [ -n "$ids" ]; then
            docker rmi -f $ids || true
          fi
          # Optionally prune dangling images only
          docker image prune -f || true
          df -h

      - name: Write .env file from secret
        run: echo "${{ secrets.ENV_FILE }}" > .env

      - name: Prepare Keycloak env file
        shell: bash
        run: |
          set -euo pipefail

          # Export env vars from .env for variable expansion
          set -a
          source .env
          set +a

          # Build a dedicated env file for KC_* vars
          cat > .keycloak.env <<EOF
          KC_HOSTNAME_URL=https://auth.portaljobs.net
          KC_HOSTNAME_ADMIN_URL=https://auth.portaljobs.net
          KC_PROXY=edge
          KC_HOSTNAME_STRICT_HTTPS=true
          KC_DB=mysql
          KC_HEALTH_ENABLED=true
          KC_METRICS_ENABLED=true
          KC_DB_URL=jdbc:mysql://${DB_ENDPOINT}:3306/${KEYCLOAK_DB_NAME}
          KC_DB_USERNAME=${DB_USER}
          KC_DB_PASSWORD=${DB_PASSWORD}
          EOF

      - name: Pull Keycloak image
        run: docker pull quay.io/keycloak/keycloak:24.0.5

      - name: Ensure data volume exists
        run: docker volume create keycloak_data >/dev/null

      - name: Prepare theme directory
        shell: bash
        run: |
          set -euo pipefail
          # Create theme directory on host
          sudo mkdir -p /opt/keycloak-themes/portal-jobs
          # Copy theme files
          sudo cp -r ./keycloak/themes/portal-jobs/* /opt/keycloak-themes/portal-jobs/
          # Set appropriate permissions
          sudo chmod -R 755 /opt/keycloak-themes/portal-jobs

      - name: Remove existing container if present
        shell: bash
        run: |
          set -euo pipefail
          CID=$(docker ps -aq -f name=^portal-keycloak$ || true)
          if [ -n "$CID" ]; then
            docker rm -f "$CID"
          fi

      - name: Run Keycloak container
        shell: bash
        run: |
          set -euo pipefail
          # Source .env for host port mapping
          set -a
          source .env
          set +a

          docker run -d \
            --name portal-keycloak \
            --restart unless-stopped \
            --memory=384m \
            --env-file .env \
            --env-file .keycloak.env \
            -e JAVA_OPTS_APPEND="-Xms64m -Xmx256m" \
            -p "${KEYCLOAK_HTTP_PORT:-8080}:8080" \
            -v keycloak_data:/opt/keycloak/data \
            -v /opt/keycloak-themes/portal-jobs:/opt/keycloak/themes/portal-jobs:ro \
            quay.io/keycloak/keycloak:24.0.5 start

      - name: Wait for Keycloak to be healthy
        shell: bash
        run: |
          set -euo pipefail
          set -a
          source .env
          set +a
          PORT="${KEYCLOAK_HTTP_PORT:-8080}"
          echo "Waiting for Keycloak on port $PORT..."
          for i in $(seq 1 24); do
            RESPONSE=$(curl -s -o /dev/stdout -w "\nHTTP_CODE:%{http_code}" "http://localhost:${PORT}/health/ready" 2>&1 || true)
            echo "Attempt $i/24 — response: $RESPONSE"
            if echo "$RESPONSE" | grep -q '"status"[[:space:]]*:[[:space:]]*"UP"'; then
              echo "Keycloak is ready."
              exit 0
            fi
            echo "Waiting 15s..."
            sleep 15
          done
          echo "Keycloak did not become healthy in time."
          docker logs portal-keycloak --tail 50 || true
          exit 1

      - name: Stop backend to free memory for import
        run: docker stop portal-backend-container || true

      - name: Import realm config (preserve users)
        shell: bash
        run: |
          set -euo pipefail
          set -a
          source .env
          set +a

          docker run --rm \
            --network host \
            --memory=256m \
            -e JAVA_TOOL_OPTIONS="-Xms32m -Xmx128m" \
            -e KEYCLOAK_URL="http://localhost:${KEYCLOAK_HTTP_PORT:-8080}" \
            -e KEYCLOAK_USER="${KEYCLOAK_ADMIN}" \
            -e KEYCLOAK_PASSWORD="${KEYCLOAK_ADMIN_PASSWORD}" \
            -e KEYCLOAK_AVAILABILITYCHECK_ENABLED=true \
            -e KEYCLOAK_AVAILABILITYCHECK_TIMEOUT=120s \
            -e IMPORT_FILES_LOCATIONS='/config/*' \
            -e IMPORT_MANAGED_USER=no-delete \
            -e IMPORT_VARSUBSTITUTION_ENABLED=true \
            -e IMPORT_FORCE=true \
            -e KEYCLOAK_VERIFY_EMAIL="${KEYCLOAK_VERIFY_EMAIL}" \
            -e KEYCLOAK_SMTP_USER="${KEYCLOAK_SMTP_USER}" \
            -e KEYCLOAK_SMTP_PASSWORD="${KEYCLOAK_SMTP_PASSWORD}" \
            -e KEYCLOAK_CLIENT_SECRET="${KEYCLOAK_CLIENT_SECRET}" \
            -v "$GITHUB_WORKSPACE/keycloak/realms:/config" \
            adorsys/keycloak-config-cli:latest-24.0.5

      - name: Restart backend
        run: docker start portal-backend-container || true

      - name: Cleanup env files
        run: rm -f .env .keycloak.env
