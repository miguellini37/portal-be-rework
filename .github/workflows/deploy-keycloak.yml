name: Deploy Keycloak

on:
  workflow_dispatch:

jobs:
  deploy-keycloak:
    runs-on: [self-hosted]
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Login to docker hub
        run: docker login -u ${{ secrets.DOCKER_USERNAME }} -p ${{ secrets.DOCKER_PASSWORD }}

      - name: Free disk space before pull
        shell: bash
        run: |
          set -euo pipefail
          # Remove only previous Keycloak images to free space
          ids=$(docker images -q quay.io/keycloak/keycloak || true)
          if [ -n "$ids" ]; then
            docker rmi -f $ids || true
          fi
          # Optionally prune dangling images only
          docker image prune -f || true
          df -h

      - name: Write .env file from secret
        run: echo "${{ secrets.ENV_FILE }}" > .env

      - name: Prepare Keycloak env file
        shell: bash
        run: |
          set -euo pipefail

          # Export env vars from .env for variable expansion
          set -a
          source .env
          set +a

          # Build a dedicated env file for KC_* vars
          cat > .keycloak.env <<EOF
          KC_HOSTNAME_URL=https://auth.portaljobs.net
          KC_HOSTNAME_ADMIN_URL=https://auth.portaljobs.net
          KC_PROXY=edge
          KC_HOSTNAME_STRICT_HTTPS=true
          KC_DB=mysql
          KC_HEALTH_ENABLED=true
          KC_METRICS_ENABLED=true
          KC_DB_URL=jdbc:mysql://${DB_ENDPOINT}:3306/${KEYCLOAK_DB_NAME}
          KC_DB_USERNAME=${DB_USER}
          KC_DB_PASSWORD=${DB_PASSWORD}
          EOF

      - name: Pull Keycloak image
        run: docker pull quay.io/keycloak/keycloak:24.0.5

      - name: Ensure data volume exists
        run: docker volume create keycloak_data >/dev/null

      - name: Remove existing container if present
        shell: bash
        run: |
          set -euo pipefail
          CID=$(docker ps -aq -f name=^portal-keycloak$ || true)
          if [ -n "$CID" ]; then
            docker rm -f "$CID"
          fi

      - name: Run Keycloak container
        shell: bash
        run: |
          set -euo pipefail
          # Source .env for host port mapping
          set -a
          source .env
          set +a

          docker run -d \
            --name portal-keycloak \
            --restart unless-stopped \
            --env-file .env \
            --env-file .keycloak.env \
            -p "${KEYCLOAK_HTTP_PORT:-8080}:8080" \
            -v keycloak_data:/opt/keycloak/data \
            quay.io/keycloak/keycloak:24.0.5 start

      - name: Cleanup env files
        run: rm -f .env .keycloak.env
