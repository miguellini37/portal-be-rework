name: Deploy Keycloak

on:
  workflow_dispatch:

jobs:
  deploy-keycloak:
    runs-on: [self-hosted]
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Login to docker hub
        run: docker login -u ${{ secrets.DOCKER_USERNAME }} -p ${{ secrets.DOCKER_PASSWORD }}

      - name: Free disk space (optional)
        run: |
          docker system prune -af || true
          docker volume prune -f || true
          df -h

      - name: Write .env file from secret
        run: echo "${{ secrets.ENV_FILE }}" > .env

      - name: Pull images with docker compose
        run: docker compose -f docker-compose.keycloak.prod.yml --env-file .env pull

      - name: Deploy/Update with docker compose
        run: |
          # Ensure any previous stack is stopped to pick up changes
          docker compose -f docker-compose.keycloak.prod.yml --env-file .env down || true
          # Start in detached mode; compose will create volumes as needed
          docker compose -f docker-compose.keycloak.prod.yml --env-file .env up -d

      - name: Cleanup .env file
        run: rm -f .env
